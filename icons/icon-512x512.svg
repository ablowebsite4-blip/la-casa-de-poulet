<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c400"/>
      <stop offset="100%" style="stop-color:#ffdd4a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#050505"/>

  <!-- Border glow -->
  <rect x="8" y="8" width="496" height="496" rx="96"
        fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.3"/>

  <!-- Chicken icon -->
  <g transform="translate(156, 126)">
    <!-- Poulet stylisé -->
    <ellipse cx="100" cy="90" rx="70" ry="60" fill="url(#goldGrad)" opacity="0.9"/>

    <!-- Crête -->
    <path d="M 70 40 Q 100 10 130 40 Q 120 25 100 30 Q 80 25 70 40"
          fill="url(#goldGrad)"/>

    <!-- Visage -->
    <circle cx="80" cy="80" r="8" fill="#050505"/>
    <circle cx="120" cy="80" r="8" fill="#050505"/>

    <!-- Bécos -->
    <ellipse cx="75" cy="95" rx="12" ry="6" fill="#ff7a00" transform="rotate(-20 75 95)"/>
    <ellipse cx="125" cy="95" rx="12" ry="6" fill="#ff7a00" transform="rotate(20 125 95)"/>

    <!-- Corps -->
    <ellipse cx="100" cy="160" rx="65" ry="50" fill="url(#goldGrad)" opacity="0.85"/>

    <!-- writing "CASA" -->
    <text x="100" y="215" text-anchor="middle"
          font-family="'Bebas Neue', Arial Black, sans-serif"
          font-size="42" font-weight="700" fill="url(#goldGrad)">CASA</text>

    <text x="100" y="250" text-anchor="middle"
          font-family="'Inter', Arial, sans-serif"
          font-size="16" font-weight="500" fill="#ffffff80">POULET</text>
  </g>
</svg>
